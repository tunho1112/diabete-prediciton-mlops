# PIPELINE DEFINITION
# Name: my-pipeline
components:
  comp-data-preparation:
    executorLabel: exec-data-preparation
    outputDefinitions:
      artifacts:
        Output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        diabete_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-data-preparation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - data_preparation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 's3fs' 'pyarrow'\
          \ 'pandas'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef data_preparation(\n    diabete_dataset: Output[Dataset]\n) ->\
          \ Dataset:\n    import s3fs\n    import pyarrow.dataset as ds\n    import\
          \ pandas \n\n    s3 = s3fs.S3FileSystem(\n        key=\"minio_access_key\"\
          ,\n        secret=\"minio_secret_key\",\n        client_kwargs={\"endpoint_url\"\
          : \"http://10.24.1.39:9000\"},\n    )\n    bucket = \"diabetes-data\"\n\
          \    prefix = \"pump\" \n    dataset = ds.dataset(\n        f\"{bucket}/{prefix}\"\
          ,\n        filesystem=s3,\n        format=\"parquet\"\n    )\n    df = dataset.to_table().to_pandas()\n\
          \    df = df.drop(columns=[\"index\"])\n    with open(diabete_dataset.path,\
          \ 'w') as f:\n        df.to_csv(f)\n\n"
        image: python:3.9
pipelineInfo:
  name: my-pipeline
root:
  dag:
    tasks:
      data-preparation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-preparation
        taskInfo:
          name: data-preparation
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.0
