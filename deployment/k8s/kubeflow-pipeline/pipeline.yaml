# PIPELINE DEFINITION
# Name: my-pipeline
# Inputs:
#    experiment_name: str
#    mlflow_uri: str
components:
  comp-data-preparation:
    executorLabel: exec-data-preparation
    outputDefinitions:
      artifacts:
        Output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        diabete_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-normalize-dataset:
    executorLabel: exec-normalize-dataset
    inputDefinitions:
      artifacts:
        diabete_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        diabete_label_test:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        diabete_label_train:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        normalized_diabete_dataset_test:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        normalized_diabete_dataset_train:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        diabete_label_test:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        diabete_label_train:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        normalized_diabete_dataset_test:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        normalized_diabete_dataset_train:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        experiment_name:
          defaultValue: diabetes_model
          isOptional: true
          parameterType: STRING
        mlflow_uri:
          defaultValue: http://10.24.1.39:5000
          isOptional: true
          parameterType: STRING
deploymentSpec:
  executors:
    exec-data-preparation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - data_preparation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 's3fs' 'pyarrow'\
          \ 'pandas'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef data_preparation(\n    diabete_dataset: Output[Dataset]\n) ->\
          \ Dataset:\n    import s3fs\n    import pyarrow.dataset as ds\n    import\
          \ pandas \n\n    s3 = s3fs.S3FileSystem(\n        key=\"minio_access_key\"\
          ,\n        secret=\"minio_secret_key\",\n        client_kwargs={\"endpoint_url\"\
          : \"http://10.24.1.39:9000\"},\n    )\n    bucket = \"diabetes-data\"\n\
          \    prefix = \"pump\" \n    dataset = ds.dataset(\n        f\"{bucket}/{prefix}\"\
          ,\n        filesystem=s3,\n        format=\"parquet\"\n    )\n    df = dataset.to_table().to_pandas()\n\
          \    df = df.drop(columns=[\"index\"])\n    with open(diabete_dataset.path,\
          \ 'w') as f:\n        df.to_csv(f)\n\n"
        image: python:3.9
    exec-normalize-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - normalize_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'scikit-learn'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef normalize_dataset(\n    diabete_dataset: Input[Dataset],\n  \
          \  normalized_diabete_dataset_train: Output[Dataset],\n    diabete_label_train:\
          \ Output[Dataset],\n    normalized_diabete_dataset_test: Output[Dataset],\n\
          \    diabete_label_test: Output[Dataset],\n):\n    import pandas as pd\n\
          \    from sklearn.model_selection import train_test_split\n    from sklearn.preprocessing\
          \ import StandardScaler\n\n\n    with open(diabete_dataset.path) as f:\n\
          \        df = pd.read_csv(f)\n\n    df_train, df_val= train_test_split(df,\
          \ test_size=0.4, random_state=42)\n    _, df_test = train_test_split(df_val,\
          \ test_size=0.5, random_state=42)\n\n    X_train = df_train.drop(columns=[\"\
          Outcome\"])\n    y_train = df_train[\"Outcome\"]\n    X_test = df_test.drop(columns=[\"\
          Outcome\"])\n    y_test = df_test[\"Outcome\"]\n\n    scaler = StandardScaler()\n\
          \n    X_train = scaler.fit_transform(X_train)\n    X_test = scaler.transform(X_test)\n\
          \n    with open(normalized_diabete_dataset_train.path, 'w') as f:\n    \
          \    pd.DataFrame(X_train).to_csv(f, index=False)\n    with open(diabete_label_train.path,\
          \ 'w') as f:\n        pd.DataFrame(y_train).to_csv(f, index=False)\n   \
          \ with open(normalized_diabete_dataset_test.path, 'w') as f:\n       pd.DataFrame(X_test).to_csv(f,\
          \ index=False)\n    with open(diabete_label_test.path, 'w') as f:\n    \
          \    pd.DataFrame(y_test).to_csv(f, index=False)\n\n"
        image: python:3.9
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas' 'scikit-learn'\
          \ 'xgboost' 'mlflow==2.22.1'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    normalized_diabete_dataset_train: Input[Dataset],\n\
          \    diabete_label_train: Input[Dataset],\n    normalized_diabete_dataset_test:\
          \ Input[Dataset],\n    diabete_label_test: Input[Dataset],\n    mlflow_uri:\
          \ str = \"http://10.24.1.39:5000\", \n    experiment_name: str = \"diabetes_model\"\
          \ \n):\n    import pandas as pd\n    import xgboost as xgb\n    import mlflow\n\
          \    from sklearn.metrics import (\n        accuracy_score,\n        f1_score,\n\
          \        precision_score,\n        recall_score,\n        roc_auc_score,\n\
          \    )\n\n    # init mlflow experiment\n    mlflow.set_tracking_uri(mlflow_uri)\n\
          \    mlflow.set_experiment(experiment_name + \"_xgb\")\n    with open(normalized_diabete_dataset_train.path)\
          \ as f:\n        X_train = pd.read_csv(f)\n    with open(diabete_label_train.path)\
          \ as f:\n        y_train = pd.read_csv(f)\n    with open(normalized_diabete_dataset_test.path)\
          \ as f:\n        X_test = pd.read_csv(f)\n    with open(diabete_label_test.path)\
          \ as f:\n        y_test = pd.read_csv(f)\n\n    model = xgb.XGBClassifier()\n\
          \n    model.fit(X_train, y_train)\n    y_pred = model.predict(X_test)\n\n\
          \    # metrics\n    accuracy = accuracy_score(y_test, y_pred)\n    precision\
          \ = precision_score(y_test, y_pred)\n    recall = recall_score(y_test, y_pred)\n\
          \    f1 = f1_score(y_test, y_pred)\n    roc_auc = roc_auc_score(y_test,\
          \ y_pred)\n    metrics = {\n        \"accuracy\": accuracy,\n        \"\
          precision\": precision,\n        \"recall\": recall,\n        \"f1\": f1,\n\
          \        \"roc_auc\": roc_auc,\n    }\n    # mlflow logging\n    mlflow.log_params(model.get_params())\n\
          \    mlflow.log_metrics(metrics)\n    signature = mlflow.models.infer_signature(X_test,\
          \ y_pred)\n    mlflow.sklearn.log_model(\n        model, \n        \"model\"\
          , \n        signature=signature,\n        registered_model_name=\"xgb_diabetes_model\"\
          \  # Register to Model Registry\n    )\n    mlflow.end_run()\n    print(\"\
          Done\")\n\n"
        image: python:3.9
pipelineInfo:
  name: my-pipeline
root:
  dag:
    tasks:
      data-preparation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-preparation
        taskInfo:
          name: data-preparation
      normalize-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-normalize-dataset
        dependentTasks:
        - data-preparation
        inputs:
          artifacts:
            diabete_dataset:
              taskOutputArtifact:
                outputArtifactKey: diabete_dataset
                producerTask: data-preparation
        taskInfo:
          name: normalize-dataset
      train-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-model
        dependentTasks:
        - normalize-dataset
        inputs:
          artifacts:
            diabete_label_test:
              taskOutputArtifact:
                outputArtifactKey: diabete_label_test
                producerTask: normalize-dataset
            diabete_label_train:
              taskOutputArtifact:
                outputArtifactKey: diabete_label_train
                producerTask: normalize-dataset
            normalized_diabete_dataset_test:
              taskOutputArtifact:
                outputArtifactKey: normalized_diabete_dataset_test
                producerTask: normalize-dataset
            normalized_diabete_dataset_train:
              taskOutputArtifact:
                outputArtifactKey: normalized_diabete_dataset_train
                producerTask: normalize-dataset
        taskInfo:
          name: train-model
  inputDefinitions:
    parameters:
      experiment_name:
        parameterType: STRING
      mlflow_uri:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.0
